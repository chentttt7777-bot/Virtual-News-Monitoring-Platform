<!DOCTYPE html>
<html>
<head>
    {% load static %}
    <link rel="icon" width="10.24" height="5.84" href="static/images/logo8.png" type="image/x-icon"><title>伪造新闻检测</title>
    <meta charset="UTF-8" />
    <!-- 引入Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    {% block extra_css %}{% endblock %}
</head>
<body>
{#    <nav class="navbar navbar-expand-lg navbar-light bg-light">#}
{#        <div class="container">#}
{#            {% if user.is_authenticated %}#}
{#                <a class="btn btn-danger" href="{% url 'logout' %}">注销</a>#}
{#            {% else %}#}
{#                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#loginModal">登录</button>#}
{#                <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#registerModal">注册</button>#}
{#            {% endif %}#}
{#        </div>#}
{#    </nav>#}

    <!-- 内容块 -->
    <!-- <div class="container mt-4">-->
    <div>
        {% block content %}{% endblock %}
    </div>

    <!-- 模态框 -->
    {% include 'registration/modals.html' %}

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
    <script>
        if (!window.authModalInitialized) {
            window.authModalInitialized = true;

            function submitForm(form, formType) {
                fetch(form.action, {
                    method: 'POST',
                    body: new FormData(form),
                    headers: {
                        'X-Requested-With': 'XMLHttpRequest',
                        'X-CSRFToken': form.querySelector('[name=csrfmiddlewaretoken]').value
                    }
                })
               .then(response => {
                    if (response.redirected) {
                        window.location.href = response.url;
                    } else {
                        return response.json();
                    }
                })
               .catch(error => {
                    alert(formType === 'login' ? '登录失败' : '注册失败');
                });
                return false; // 阻止默认表单提交
            }

            // 确保模态框完全关闭的工具函数
            function ensureModalsClosed() {
                // 关闭所有模态框实例
                document.querySelectorAll('.modal').forEach(modal => {
                    const instance = bootstrap.Modal.getInstance(modal);
                    if (instance) instance.hide();
                });

                // 移除所有遮罩层
                document.querySelectorAll('.modal-backdrop').forEach(el => el.remove());

                // 恢复body样式
                document.body.classList.remove('modal-open');
                document.body.style.paddingRight = '';
            }

            // 页面加载时检查错误消息
            document.addEventListener('DOMContentLoaded', function() {
                // 检查登录错误
                {% if request.session.login_error %}
                    ensureModalsClosed();
                    alert("{{ request.session.login_error }}");
                    var loginModal = new bootstrap.Modal(document.getElementById('loginModal'));
                    loginModal.show();
                    fetch("{% url 'clear_login_error' %}");
                {% endif %}

                // 检查注册错误
                {% if request.session.register_error %}
                    ensureModalsClosed();
                    alert("{{ request.session.register_error }}");
                    var registerModal = new bootstrap.Modal(document.getElementById('registerModal'));
                    registerModal.show();
                    fetch("{% url 'clear_register_error' %}");
                {% endif %}
            });
        }
    </script>
</body>
</html>
