<!-- 登录模态框 -->
<div class="modal fade" id="loginModal">
    <div class="modal-dialog">
        <div class="modal-content">
            <form method="POST" action="{% url 'login' %}"  onsubmit="return submitForm(this, 'login')">
                {% csrf_token %}
                <div class="modal-header">
                    <h5 class="modal-title">登录</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
                    <div class="mb-3">
                        <input type="text" name="username" class="form-control" placeholder="用户名" required>
                    </div>
                    <div class="mb-3">
                        <input type="password" name="password" class="form-control" placeholder="密码" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn btn-primary">登录</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- 注册模态框 -->
<div class="modal fade" id="registerModal">
    <div class="modal-dialog">
        <div class="modal-content">
            <form method="POST" action="{% url 'register' %}"  onsubmit="return submitForm(this, 'register')">
                {% csrf_token %}
                <div class="modal-header">
                    <h5 class="modal-title">注册</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    {{ form.non_field_errors }}

                    <div class="mb-3">
                        <input type="text" name="username" class="form-control" placeholder="用户名" required>
                    </div>
                    <div class="mb-3">
                        <input type="email" name="email" class="form-control" placeholder="邮箱" required>
                    </div>
                    <div class="mb-3">
                        <input type="password" name="password1" class="form-control" placeholder="密码" required>
                    </div>
                    <div class="mb-3">
                        <input type="password" name="password2" class="form-control" placeholder="确认密码" required>
                    </div>
                    <div class="mb-3">
                        <input type="tel" name="phone" class="form-control" placeholder="手机号" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn btn-success">注册</button>
                </div>
            </form>
        </div>
    </div>
</div>
